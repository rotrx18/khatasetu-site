<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - KhataSetu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #2563eb, #4f46e5, #7c3aed);
  color: white;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.container {
  max-width: 600px;
  padding: 20px;
}

.logo {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 20px;
}

.logo span {
  font-size: 32px;
}

h1 {
  font-size: 100px;
  font-weight: 700;
  opacity: 0.9;
}

h2 {
  font-size: 28px;
  margin-bottom: 15px;
  font-weight: 500;
}

p {
  opacity: 0.85;
  margin-bottom: 30px;
}

.btn {
  display: inline-block;
  padding: 14px 30px;
  background: white;
  color: #2563eb;
  text-decoration: none;
  border-radius: 50px;
  font-weight: 600;
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-3px);
}

.footer {
  position: absolute;
  bottom: 20px;
  font-size: 14px;
  opacity: 0.7;
}

@media (max-width: 600px) {
  h1 {
    font-size: 70px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">
    📘 KhataSetu
  </div>

  <h1>404</h1>
  <h2>Page Not Found</h2>

  <p>
    Oops! The page you are looking for doesn’t exist or may have been moved.
  </p>

  <a href="/" class="btn">Go Back Home</a>
</div>

<!-- Footer -->
<div id="footer"></div>


<script>

function loadComponent(id,file){
fetch(file)
.then(res=>res.text())
.then(data=>{
document.getElementById(id).innerHTML=data;
});
}

loadComponent("footer","/footer.html");

</script>

</body>
</html>
