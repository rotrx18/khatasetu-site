<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact KhataSetu | Digital Ledger App Support</title>
    <meta name="description" content="Have questions? Contact KhataSetu for technical support, business partnerships, or feedback. We respond within 24-48 hours.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://khatasetu.com/contact/">
    
    <meta property="og:title" content="Contact KhataSetu Support">
    <meta property="og:description" content="Reach out to the KhataSetu team for help with your digital ledger and business accounting.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://khatasetu.com/contact/">
    <meta property="og:image" content="https://khatasetu.com/logo.png">

    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="/logo.png">

    <style>
        /* Custom tweaks to bridge Contact Form with Global CSS */
        .contact-header { margin-bottom: 50px; }
        .contact-header h1 { color: #0f172a; font-size: 3rem; margin-bottom: 10px; }
        
        /* Breadcrumb styling */
        .breadcrumb { margin-bottom: 30px; font-size: 0.9rem; color: #64748b; text-align: left; }
        .breadcrumb a { color: #2563eb; }

        /* Form Specifics */
        .contact-form { margin-top: 40px; text-align: left; }
        .contact-form label { display: block; margin-bottom: 8px; font-weight: 600; color: #1e293b; }
        .contact-form input, 
        .contact-form textarea { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 20px; 
            border: 1px solid #cbd5e1; 
            border-radius: 12px; 
            font-family: inherit; 
            font-size: 1rem;
            background: #f8fafc;
            transition: border-color 0.3s;
        }
        .contact-form input:focus, 
        .contact-form textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        
        /* Overriding global btn for full-width submit */
        .btn-full { width: 100%; text-align: center; border: none; cursor: pointer; }
    </style>
</head>

<body>

<div id="navbar"></div>

<main class="container" style="padding-top: 60px; padding-bottom: 100px;">
    
    <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/">Home</a> › <strong>Contact</strong>
    </nav>

    <section class="section light">
        
        <header class="contact-header">
            <h1>Get in Touch</h1>
            <p>We're on a mission to simplify business accounting globally. How can we help you today?</p>
        </header>

        <div class="grid" style="margin-bottom: 50px;">
            <div class="card" style="text-align: center;">
                <h3 style="color: #2563eb;">📧 Email Us</h3>
                <p>Support & Inquiries:<br><strong>support@rotrxitsolution.com</strong></p>
            </div>
            <div class="card" style="text-align: center;">
                <h3 style="color: #2563eb;">⏱ Response Time</h3>
                <p>Our team typically replies within<br><strong>24–48 business hours.</strong></p>
            </div>
        </div>

        <div class="contact-form">
            <h2 style="margin-bottom: 30px; text-align: center; color: #0f172a;">Send a Message</h2>
            <form action="https://formspree.io/f/maqdzgzk" method="POST">
                <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0 20px; margin-top:0;">
                    <div>
                        <label>Full Name</label>
                        <input type="text" name="name" placeholder="John Doe" required>
                    </div>
                    <div>
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="john@example.com" required>
                    </div>
                </div>

                <label>Mobile Number</label>
                <input type="tel" name="mobile" placeholder="+91 98765 43210" required>

                <label>Message</label>
                <textarea name="message" placeholder="Tell us how we can help..." rows="5" required></textarea>
                
                <input type="text" name="_gotcha" style="display:none">
                
                <button type="submit" class="btn btn-full">Send Message</button>
            </form>
        </div>
    </section>
</main>

<div id="footer"></div>

<script src="/script.js"></script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ContactPage",
  "name": "Contact KhataSetu",
  "url": "https://khatasetu.com/contact/",
  "description": "Customer support and business contact page for KhataSetu app.",
  "publisher": {
    "@type": "Organization",
    "name": "KhataSetu",
    "logo": "https://khatasetu.com/logo.png"
  }
}
</script>

</body>
</html>
