<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact KhataSetu | Digital Ledger App Support & Inquiries</title>
    <meta name="description" content="Have questions? Contact KhataSetu for technical support, business partnerships, or feedback regarding our digital ledger app. We respond within 24-48 hours.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://khatasetu.com/contact/">
    <meta name="theme-color" content="#2563eb">

    <meta property="og:title" content="Contact KhataSetu Support">
    <meta property="og:description" content="Reach out to the KhataSetu team for help with your digital ledger and business accounting.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://khatasetu.com/contact/">
    <meta property="og:image" content="https://khatasetu.com/hero-devices.webp">

    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="/logo.png">

    <style>
        .contact-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .contact-card { background: #f8fafc; padding: 30px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .contact-card h3 { color: #2563eb; margin-bottom: 10px; }
        
        .form-wrapper { background: #ffffff; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; font-size: 1rem; }
        .btn-submit { background: #2563eb; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-submit:hover { background: #1e40af; transform: translateY(-2px); }
        
        .breadcrumb { margin-bottom: 20px; font-size: 0.9rem; color: #64748b; }
        .breadcrumb a { color: #2563eb; text-decoration: none; }
    </style>
</head>

<body>

<div id="navbar"></div>

<main class="contact-container">
    <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/">Home</a> › <strong>Contact</strong>
    </nav>

    <header style="text-align: center; margin-bottom: 60px;">
        <h1 style="font-size: 2.5rem; color: #0f172a;">Get in Touch</h1>
        <p style="font-size: 1.1rem; color: #64748b;">We're on a mission to simplify business accounting globally. How can we help you today?</p>
    </header>

    <div class="contact-grid">
        <div class="contact-card">
            <h3>📧 Email Us</h3>
            <p>Support & Inquiries:<br><strong>support@rotrxitsolution.com</strong></p>
        </div>
        <div class="contact-card">
            <h3>⏱ Response Time</h3>
            <p>Our team typically replies within<br><strong>24–48 business hours.</strong></p>
        </div>
    </div>

    <div class="form-wrapper">
        <h2 style="margin-top: 0; margin-bottom: 25px;">Send a Message</h2>
        <form action="https://formspree.io/f/maqdzgzk" method="POST" class="contact-form">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="tel" name="mobile" placeholder="Mobile Number (e.g. +91...)" required>
            <textarea name="message" placeholder="How can we help you?" rows="5" required></textarea>
            
            <input type="text" name="_gotcha" style="display:none">
            
            <button type="submit" class="btn-submit">Send Message</button>
        </form>
    </div>
</main>

<div id="footer"></div>

<script src="../script.js"></script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ContactPage",
  "name": "Contact KhataSetu",
  "url": "https://khatasetu.com/contact/",
  "description": "Customer support and business contact page for KhataSetu app.",
  "publisher": {
    "@type": "Organization",
    "name": "KhataSetu",
    "logo": "https://khatasetu.com/logo.png"
  }
}
</script>

</body>
</html>
